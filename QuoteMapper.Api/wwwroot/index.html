<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Franca Seguros - Revisão de Cotação</title>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --primary: #0f766e;
            --primary-dark: #0b5e58;
            --border: #d1d5db;
            --bg: #f3f4f6;
            --text: #111827;
            --muted: #6b7280;
            --danger: #b91c1c;
            --success: #166534;
            --card: #ffffff;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            margin-bottom: 24px;
        }

            .header h1 {
                margin: 0 0 8px 0;
                font-size: 28px;
                color: var(--primary);
            }

            .header p {
                margin: 0;
                color: var(--muted);
                font-size: 14px;
            }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

            .field label {
                font-size: 13px;
                font-weight: 700;
                color: #374151;
            }

            .field input,
            .field select {
                width: 100%;
                padding: 12px 14px;
                border: 1px solid var(--border);
                border-radius: 10px;
                font-size: 14px;
                background: #fff;
                color: var(--text);
            }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

            .btn-primary:hover {
                background: var(--primary-dark);
            }

        .btn-secondary {
            background: #e5e7eb;
            color: var(--text);
        }

            .btn-secondary:hover {
                background: #d1d5db;
            }

        .btn-edit-active {
            background: var(--primary);
            color: white;
        }

            .btn-edit-active:hover {
                background: var(--primary-dark);
            }

        .btn-cancel {
            background: #fee2e2;
            color: #991b1b;
        }

            .btn-cancel:hover {
                background: #fecaca;
            }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 14px;
            font-size: 14px;
            color: var(--muted);
        }

            .status.error {
                color: var(--danger);
                font-weight: 700;
            }

            .status.success {
                color: var(--success);
                font-weight: 700;
            }

        .preview-title {
            margin: 0 0 14px 0;
            font-size: 20px;
            color: var(--primary);
        }

        .preview-shell {
            background: transparent;
            border-radius: 12px;
            padding: 0;
            overflow: visible;
        }

        .preview-frame {
            width: 210mm;
            max-width: 100%;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            overflow: visible;
        }

        iframe {
            width: 100%;
            height: 0;
            border: none;
            display: block;
            background: white;
            overflow: hidden;
        }

        .bottom-actions {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-wrap: wrap;
        }

        .empty-state {
            color: var(--muted);
            font-size: 14px;
            padding: 16px 0 0;
        }

        @media (max-width: 980px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .preview-frame {
                width: 100%;
                max-width: 100%;
            }

            .bottom-actions {
                justify-content: stretch;
            }

                .bottom-actions button {
                    width: 100%;
                }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Franca Seguros - Revisão de Cotação</h1>
            <p>Envie o PDF, selecione o tipo de cobertura e revise o documento antes de imprimir.</p>
        </div>

        <div class="card">
            <form id="uploadForm">
                <div class="form-grid">
                    <div class="field">
                        <label for="file">Arquivo PDF</label>
                        <input id="file" name="file" type="file" accept=".pdf,application/pdf" required />
                    </div>

                    <div class="field">
                        <label for="insurer">Seguradora</label>
                        <select id="insurer" name="insurer" required>
                            <option value="Allianz" selected>Allianz</option>
                            <option value="Zurich">Zurich</option>
                            <option value="Azul">Azul</option>
                            <option value="Banestes">Banestes</option>
                            <option value="Bradesco">Bradesco</option>
                            <option value="Darwin">Darwin</option>
                            <option value="Itau">Itaú</option>
                            <option value="Justos">Justos</option>
                            <option value="Mapfre">Mapfre</option>
                            <option value="Mitsui">Mitsui</option>
                            <option value="Porto">Porto Seguro</option>
                            <option value="Suhai">Suhai</option>
                            <option value="TokioMarine">Tokio Marine</option>
                            <option value="Yelum">Yelum</option>
                        </select>
                    </div>

                    <div class="field" id="coverageTypeField">
                        <label for="coverageType">Coverage Type</label>
                        <select id="coverageType" name="coverageType">
                            <option value="RouboEFurto">Roubo e Furto</option>
                            <option value="Basico">Básico</option>
                            <option value="Ampliado">Ampliado</option>
                            <option value="Completo" selected>Completo</option>
                            <option value="Master">Master</option>
                            <option value="Exclusivo">Exclusivo</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-primary" id="submitBtn">Gerar HTML</button>
                    </div>
                </div>
            </form>

            <div id="status" class="status">Selecione um PDF e clique em "Gerar HTML".</div>
        </div>

        <div class="card">
            <h2 class="preview-title">Pré-visualização</h2>

            <div id="emptyState" class="empty-state">
                O HTML gerado aparecerá aqui abaixo.
            </div>

            <div id="previewContainer" class="preview-shell" style="display:none;">
                <div class="preview-frame">
                    <iframe id="previewFrame"
                            title="Pré-visualização do HTML gerado"
                            scrolling="no">
                    </iframe>
                </div>
            </div>

            <div class="bottom-actions" id="printSection" style="display:none;">
                <button type="button" class="btn-secondary" id="editBtn">Editar</button>
                <button type="button" class="btn-cancel" id="cancelEditBtn" style="display:none;">Cancelar edição</button>
                <button type="button" class="btn-secondary" id="printBtn">Imprimir</button>
            </div>
        </div>

        <div>
            <p>V.18</p>
        </div>
    </div>



    <script>
        const form = document.getElementById("uploadForm");
        const fileInput = document.getElementById("file");
        const coverageTypeSelect = document.getElementById("coverageType");
        const submitBtn = document.getElementById("submitBtn");
        const statusEl = document.getElementById("status");
        const previewContainer = document.getElementById("previewContainer");
        const previewFrame = document.getElementById("previewFrame");
        const printBtn = document.getElementById("printBtn");
        const editBtn = document.getElementById("editBtn");
        const cancelEditBtn = document.getElementById("cancelEditBtn");
        const printSection = document.getElementById("printSection");
        const emptyState = document.getElementById("emptyState");
        const insurerSelect = document.getElementById("insurer");

        let isEditing = false;
        let currentHtml = "";
        let htmlBeforeEditing = "";

        const editableLabelTypes = {
            "proponente": "text",
            "tabela fipe": "text",
            "veiculo": "text",
            "placa": "text",

            "principal condutor": "text",
            "estado civil": "text",
            "reside em": "text",
            "uso do veiculo": "text",
            "cep de pernoite": "text",
            "reside com pessoas entre 18 a 25 anos?": "text",

            "danos materiais": "currency",
            "danos corporais": "currency",
            "danos morais": "currency",
            "app - morte": "currency",
            "app - invalidez permanente": "currency",
            "assistencia guincho": "text",
            "carro reserva": "text",

            "franquia para-brisa": "currency",
            "franquia vidro lateral": "currency",
            "franquia farol convencional": "currency",
            "franquia lanterna convencional": "currency",
            "franquia farol xenon/led": "currency",
            "franquia lanterna led": "currency",
            "franquia retrovisor externo": "currency",
            "franquia lanterna auxiliar": "currency",
            "franquia protecao pneu e roda": "currency",
            "franquia pequenos reparos": "currency",
            "franquia do veiculo": "currency"
        };

        const coverageTypeField = document.getElementById("coverageTypeField");

        function updateCoverageTypeVisibility() {
            const isAllianz = insurerSelect.value === "Allianz";

            coverageTypeField.style.display = isAllianz ? "flex" : "none";
            coverageTypeSelect.required = isAllianz;
            coverageTypeSelect.disabled = !isAllianz;
        }

        insurerSelect.addEventListener("change", updateCoverageTypeVisibility);
        updateCoverageTypeVisibility();

        function setStatus(message, type = "") {
            statusEl.className = "status";

            if (type) {
                statusEl.classList.add(type);
            }

            statusEl.textContent = message;
        }

        function normalizeText(value) {
            return String(value || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, " ")
                .toLowerCase()
                .trim();
        }

        function isEditableLabelText(text) {
            return Object.prototype.hasOwnProperty.call(editableLabelTypes, normalizeText(text));
        }

        function formatCurrencyBR(value) {
            const cleanValue = String(value || "")
                .replace("R$", "")
                .replace(/\s/g, "")
                .replace(/\./g, "")
                .replace(",", ".")
                .replace(/[^\d.]/g, "");

            if (!cleanValue) return "";

            const numberValue = Number(cleanValue);

            if (Number.isNaN(numberValue)) return "";

            return numberValue.toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL",
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function clearSelection(doc) {
            const selection = doc.getSelection?.();

            if (selection) {
                selection.removeAllRanges();
            }
        }

        function isCandidateValueElement(el) {
            if (!el) return false;
            if (el.dataset?.editableLabel === "true") return false;

            const text = el.textContent.trim();

            if (isEditableLabelText(text)) return false;

            const tag = el.tagName.toLowerCase();

            if (!["td", "div", "span", "strong", "b", "p"].includes(tag)) {
                return false;
            }

            if (el.children.length > 3) return false;

            return true;
        }

        function rectsOverlapVertically(a, b) {
            return a.top < b.bottom && a.bottom > b.top;
        }

        function findValueElementForLabel(labelEl) {
            const doc = labelEl.ownerDocument;
            const labelText = normalizeText(labelEl.textContent);
            const type = editableLabelTypes[labelText];

            if (!type) return null;

            const labelRect = labelEl.getBoundingClientRect();
            const parent = labelEl.parentElement;

            if (parent) {
                const siblings = Array.from(parent.children);
                const labelIndex = siblings.indexOf(labelEl);

                if (labelIndex >= 0) {
                    for (let i = labelIndex + 1; i < siblings.length; i++) {
                        const sibling = siblings[i];

                        if (isCandidateValueElement(sibling)) {
                            const siblingText = sibling.textContent.trim();

                            if (!isEditableLabelText(siblingText)) {
                                return sibling;
                            }
                        }
                    }
                }
            }

            const row = labelEl.closest("tr");

            if (row) {
                const cells = Array.from(row.querySelectorAll("td, th"));
                const cellIndex = cells.indexOf(labelEl);

                if (cellIndex >= 0) {
                    for (let i = cellIndex + 1; i < cells.length; i++) {
                        const cell = cells[i];

                        if (isCandidateValueElement(cell)) {
                            return cell;
                        }
                    }
                }
            }

            const candidates = Array.from(doc.body.querySelectorAll("td, div, span, strong, b, p"))
                .filter(isCandidateValueElement)
                .filter(candidate => candidate !== labelEl);

            const sameLineCandidates = candidates
                .map(candidate => ({
                    el: candidate,
                    rect: candidate.getBoundingClientRect()
                }))
                .filter(item => {
                    const rect = item.rect;

                    return (
                        rect.width > 0 &&
                        rect.height > 0 &&
                        rect.left > labelRect.right &&
                        rectsOverlapVertically(labelRect, rect)
                    );
                })
                .sort((a, b) => {
                    const aDistance = Math.abs(a.rect.left - labelRect.right);
                    const bDistance = Math.abs(b.rect.left - labelRect.right);

                    return aDistance - bDistance;
                });

            if (sameLineCandidates.length > 0) {
                return sameLineCandidates[0].el;
            }

            const belowCandidates = candidates
                .map(candidate => ({
                    el: candidate,
                    rect: candidate.getBoundingClientRect()
                }))
                .filter(item => {
                    const rect = item.rect;

                    return (
                        rect.width > 0 &&
                        rect.height > 0 &&
                        rect.top >= labelRect.bottom &&
                        rect.top - labelRect.bottom <= 36 &&
                        Math.abs(rect.left - labelRect.left) <= 20
                    );
                })
                .sort((a, b) => {
                    const aDistance = Math.abs(a.rect.top - labelRect.bottom);
                    const bDistance = Math.abs(b.rect.top - labelRect.bottom);

                    return aDistance - bDistance;
                });

            if (belowCandidates.length > 0) {
                return belowCandidates[0].el;
            }

            return null;
        }

        function addPaymentTableEditableElements(doc, editableElements) {
            const tables = doc.body.querySelectorAll("table");

            tables.forEach(table => {
                const rows = table.querySelectorAll("tr");

                rows.forEach(row => {
                    const cells = Array.from(row.querySelectorAll("td"));

                    if (cells.length < 2) return;

                    cells.forEach((cell, index) => {
                        if (index === 0) return;

                        const text = cell.textContent.trim();

                        if (
                            /^R\$\s*[\d.,]+$/i.test(text) ||
                            /^[\d.]+,\d{2}$/.test(text) ||
                            /^\d+$/.test(text)
                        ) {
                            editableElements.add(cell);
                            cell.dataset.valueType = "currency";
                        }
                    });
                });
            });
        }

        function getEditableValueElements(doc) {
            const editableElements = new Set();

            const possibleLabels = Array.from(doc.body.querySelectorAll("td, div, span, strong, b, p"));

            possibleLabels.forEach(labelEl => {
                const labelText = normalizeText(labelEl.textContent);

                if (!editableLabelTypes[labelText]) return;

                labelEl.dataset.editableLabel = "true";

                const valueEl = findValueElementForLabel(labelEl);

                if (!valueEl) return;

                const valueText = normalizeText(valueEl.textContent);

                if (editableLabelTypes[valueText]) return;

                valueEl.dataset.valueType = editableLabelTypes[labelText];

                if (!valueEl.textContent.trim()) {
                    valueEl.innerHTML = "&nbsp;";
                }

                editableElements.add(valueEl);
            });

            addPaymentTableEditableElements(doc, editableElements);

            return Array.from(editableElements);
        }

        function normalizeInitialCurrencyValues(doc) {
            const editableElements = getEditableValueElements(doc);

            editableElements.forEach(el => {
                const valueType = el.dataset.valueType;
                const text = el.textContent.trim();

                if (valueType !== "currency") return;
                if (!text) return;
                if (/^R\$\s*[\d.,]+$/i.test(text)) return;

                if (/^\d+$/.test(text) || /^[\d.]+,\d{2}$/.test(text)) {
                    el.textContent = formatCurrencyBR(text);
                }
            });
        }

        function normalizeEditableValue(el) {
            const currentText = el.textContent.trim();
            const originalValue = el.dataset.originalValue || "";

            if (!currentText || currentText === "\u00A0") {
                if (originalValue) {
                    el.textContent = originalValue;
                } else {
                    el.innerHTML = "&nbsp;";
                }

                return;
            }

            if (el.dataset.valueType === "currency") {
                el.textContent = formatCurrencyBR(currentText);
            } else {
                el.textContent = currentText;
            }
        }

        function normalizeAllEditableValues(doc) {
            const editableElements = doc.body.querySelectorAll("[data-editable-value='true']");

            editableElements.forEach(el => {
                normalizeEditableValue(el);
            });
        }

        function enableEditableValue(el) {
            el.setAttribute("contenteditable", "true");
            el.setAttribute("data-editable-value", "true");

            if (!el.dataset.valueType) {
                el.dataset.valueType = "text";
            }

            if (!el.textContent.trim()) {
                el.innerHTML = "&nbsp;";
            }

            if (el.dataset.listenersAttached === "true") return;

            el.dataset.listenersAttached = "true";

            el.addEventListener("focus", () => {
                const currentText = el.textContent.trim();

                el.dataset.originalValue = currentText === "\u00A0" ? "" : currentText;

                if (el.dataset.valueType === "currency") {
                    if (!currentText || currentText === "\u00A0") {
                        el.textContent = "";
                        return;
                    }

                    el.textContent = currentText
                        .replace("R$", "")
                        .replace(/\s/g, "")
                        .replace(/\./g, "")
                        .replace(",00", "")
                        .trim();
                }
            });

            el.addEventListener("keydown", event => {
                const allowedKeys = [
                    "Backspace",
                    "Delete",
                    "Tab",
                    "ArrowLeft",
                    "ArrowRight",
                    "ArrowUp",
                    "ArrowDown",
                    "Home",
                    "End",
                    "Enter"
                ];

                if (allowedKeys.includes(event.key)) {
                    if (event.key === "Enter") {
                        event.preventDefault();
                        el.blur();
                    }

                    return;
                }

                if (el.dataset.valueType === "currency" && !/^\d$/.test(event.key)) {
                    event.preventDefault();
                }
            });

            el.addEventListener("blur", () => {
                normalizeEditableValue(el);
                resizePreviewFrame();
            });

            el.addEventListener("input", resizePreviewFrame);
        }

        function disableEditableValue(el) {
            normalizeEditableValue(el);

            el.removeAttribute("contenteditable");
            el.removeAttribute("data-editable-value");

            if (el.innerHTML.trim() === "&nbsp;") {
                el.innerHTML = "";
            }
        }

        function makeOnlyValuesEditable(doc, enabled) {
            const oldEditableElements = doc.body.querySelectorAll("[data-editable-value='true']");

            oldEditableElements.forEach(el => {
                if (!enabled) {
                    disableEditableValue(el);
                }
            });

            if (!enabled) {
                const labels = doc.body.querySelectorAll("[data-editable-label='true']");

                labels.forEach(label => {
                    label.removeAttribute("data-editable-label");
                });

                return;
            }

            const editableElements = getEditableValueElements(doc);

            editableElements.forEach(enableEditableValue);
            normalizeInitialCurrencyValues(doc);
        }

        function injectPreviewFixes(html) {
            const fixStyle = `
                    <style>
                        html, body {
                            margin: 0 !important;
                            padding: 0 !important;
                            overflow-x: hidden !important;
                            overflow-y: hidden !important;
                        }

                        body {
                            width: 210mm !important;
                            max-width: 210mm !important;
                            min-height: auto !important;
                        }

                        .page {
                            overflow: visible !important;
                        }

                        table {
                            table-layout: fixed;
                            word-break: break-word;
                        }

                        img {
                            max-width: 100% !important;
                            height: auto !important;
                        }

                        body.preview-editing [data-editable-value="true"] {
                            cursor: text !important;
                            outline: 1px dashed rgba(15, 118, 110, 0.45);
                            outline-offset: 2px;
                            min-width: 70px;
                        }

                        body.preview-editing [data-editable-value="true"]:focus {
                            outline: 2px solid #0f766e !important;
                            background: #ecfdf5 !important;
                        }

                        body.preview-editing [data-editable-label="true"] {
                            cursor: default !important;
                        }

                        @media print {
                            body.preview-editing [data-editable-value="true"],
                            body.preview-editing [data-editable-value="true"]:focus {
                                outline: none !important;
                                background: transparent !important;
                            }
                        }
                    </style>`;

            if (html.includes("</head>")) {
                return html.replace("</head>", `${fixStyle}</head>`);
            }

            return `${fixStyle}${html}`;
        }

        function normalizeReturnedHtml(html) {
            const normalized = html
                .replaceAll("https://localhost:7133/logos/", "/logos/")
                .replaceAll("http://localhost:7133/logos/", "/logos/")
                .replaceAll("https://localhost/logos/", "/logos/")
                .replaceAll("http://localhost/logos/", "/logos/");

            return injectPreviewFixes(normalized);
        }

        function resizePreviewFrame() {
            try {
                const doc = previewFrame.contentDocument || previewFrame.contentWindow?.document;

                if (!doc) return;

                const body = doc.body;
                const html = doc.documentElement;

                if (body) {
                    body.style.overflow = "hidden";
                }

                if (html) {
                    html.style.overflow = "hidden";
                }

                const height = Math.max(
                    body ? body.scrollHeight : 0,
                    body ? body.offsetHeight : 0,
                    html ? html.scrollHeight : 0,
                    html ? html.offsetHeight : 0,
                    html ? html.clientHeight : 0
                );

                if (height > 0) {
                    previewFrame.style.height = `${height + 2}px`;
                }
            } catch (error) {
                console.error("Erro ao redimensionar preview:", error);
            }
        }

        function updateEditButtons() {
            if (isEditing) {
                editBtn.textContent = "Salvar edição";
                editBtn.classList.add("btn-edit-active");
                cancelEditBtn.style.display = "inline-block";
            } else {
                editBtn.textContent = "Editar";
                editBtn.classList.remove("btn-edit-active");
                cancelEditBtn.style.display = "none";
            }
        }

        function setEditMode(enabled) {
            const doc = previewFrame.contentDocument || previewFrame.contentWindow?.document;

            if (!doc || !doc.body) {
                setStatus("A pré-visualização ainda não está pronta para edição.", "error");
                return;
            }

            isEditing = enabled;

            if (enabled) {
                htmlBeforeEditing = doc.documentElement.outerHTML;

                makeOnlyValuesEditable(doc, true);
                doc.body.classList.add("preview-editing");

                setStatus("Modo edição ativado. Clique somente nos valores para alterar.", "success");
            } else {
                const activeElement = doc.activeElement;

                if (activeElement && activeElement.dataset?.editableValue === "true") {
                    activeElement.blur();
                }

                normalizeAllEditableValues(doc);

                makeOnlyValuesEditable(doc, false);
                doc.body.classList.remove("preview-editing");
                clearSelection(doc);

                currentHtml = doc.documentElement.outerHTML;
                htmlBeforeEditing = "";

                setStatus("Edição salva. Você já pode imprimir.", "success");
            }

            updateEditButtons();
            resizePreviewFrame();
            requestAnimationFrame(resizePreviewFrame);
            setTimeout(resizePreviewFrame, 150);
        }

        function cancelEditMode() {
            if (!isEditing || !htmlBeforeEditing) return;

            isEditing = false;
            currentHtml = htmlBeforeEditing;

            previewFrame.onload = () => {
                const doc = previewFrame.contentDocument || previewFrame.contentWindow?.document;

                if (doc?.body) {
                    doc.body.classList.remove("preview-editing");
                    clearSelection(doc);
                }

                htmlBeforeEditing = "";
                updateEditButtons();

                setStatus("Edição cancelada. As alterações foram descartadas.", "success");

                resizePreviewFrame();
                requestAnimationFrame(resizePreviewFrame);
                setTimeout(resizePreviewFrame, 150);
                setTimeout(resizePreviewFrame, 300);
            };

            previewFrame.srcdoc = currentHtml;
        }

        function resetEditMode() {
            isEditing = false;
            htmlBeforeEditing = "";
            updateEditButtons();
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const file = fileInput.files[0];
            const insurer = insurerSelect.value;
            const coverageType = insurer === "Allianz" ? coverageTypeSelect.value : "";

            if (!file) {
                setStatus("Selecione um arquivo PDF.", "error");
                return;
            }

            submitBtn.disabled = true;
            printSection.style.display = "none";
            previewContainer.style.display = "none";
            emptyState.style.display = "block";
            resetEditMode();

            setStatus("Enviando PDF e gerando HTML...");

            try {
                const formData = new FormData();
                formData.append("File", file);
                formData.append("Insurer", insurer);
                if (insurer === "Allianz") {
                    formData.append("CoverageType", coverageType);
                }

                const response = await fetch("/api/pdf-extraction/extract-template-html", {
                    method: "POST",
                    body: formData
                });

                const contentType = response.headers.get("content-type") || "";

                if (!response.ok) {
                    if (contentType.includes("application/json")) {
                        const errorJson = await response.json();
                        throw new Error(errorJson.message || errorJson.error || "Erro ao processar o PDF.");
                    }

                    const errorText = await response.text();
                    throw new Error(errorText || "Erro ao processar o PDF.");
                }

                const html = await response.text();
                const finalHtml = normalizeReturnedHtml(html);

                currentHtml = finalHtml;

                previewFrame.onload = () => {
                    const doc = previewFrame.contentDocument || previewFrame.contentWindow?.document;

                    if (doc?.body) {
                        doc.body.classList.remove("preview-editing");

                        doc.addEventListener("input", () => {
                            resizePreviewFrame();
                        });
                    }

                    previewContainer.style.display = "block";
                    printSection.style.display = "flex";
                    emptyState.style.display = "none";

                    setStatus("HTML gerado com sucesso. Revise abaixo antes de imprimir.", "success");

                    resizePreviewFrame();
                    requestAnimationFrame(resizePreviewFrame);
                    setTimeout(resizePreviewFrame, 50);
                    setTimeout(resizePreviewFrame, 150);
                    setTimeout(resizePreviewFrame, 300);
                    setTimeout(resizePreviewFrame, 600);
                };

                previewFrame.srcdoc = finalHtml;
            } catch (error) {
                setStatus(error.message || "Falha ao gerar o HTML.", "error");
            } finally {
                submitBtn.disabled = false;
            }
        });

        editBtn.addEventListener("click", () => {
            setEditMode(!isEditing);
        });

        cancelEditBtn.addEventListener("click", () => {
            cancelEditMode();
        });

        printBtn.addEventListener("click", () => {
            const frameWindow = previewFrame.contentWindow;
            const doc = previewFrame.contentDocument || frameWindow?.document;

            if (!frameWindow || !doc) {
                setStatus("A pré-visualização ainda não está pronta para impressão.", "error");
                return;
            }

            if (isEditing) {
                setEditMode(false);
            }

            doc.body?.classList.remove("preview-editing");

            const editableElements = doc.body.querySelectorAll("[data-editable-value='true']");
            editableElements.forEach(disableEditableValue);

            clearSelection(doc);

            frameWindow.focus();
            frameWindow.print();
        });

        window.addEventListener("resize", resizePreviewFrame);
    </script>
</body>
</html>
